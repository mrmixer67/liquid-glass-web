name: Test and publish library

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, test and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chrome for Playwright
        run: npx playwright install --with-deps chrome
      - name: Run all checks
        run: npm test
      - name: Upload browser diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-failure
          path: test-results/playwright
          if-no-files-found: ignore

  build-pages:
    name: Build library artifact
    if: github.event_name != 'pull_request'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Build standalone library
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build-pages
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
