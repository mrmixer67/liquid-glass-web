name: Publish release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Verify tag matches package version
        run: node -e "const version = require('./package.json').version; if ('v' + version !== process.env.GITHUB_REF_NAME) process.exit(1)"
      - name: Install dependencies
        run: npm ci
      - name: Install Chrome for Playwright
        run: npx playwright install --with-deps chrome
      - name: Run all checks
        run: npm test
      - name: Upload browser diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-failure
          path: test-results/playwright
          if-no-files-found: ignore
      - name: Prepare downloadable assets
        run: |
          cp public/liquid-glass.js liquid-glass.js
          sha256sum liquid-glass.js > liquid-glass.js.sha256
      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" liquid-glass.js liquid-glass.js.sha256 --verify-tag --generate-notes --title "Liquid Glass Web $GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}
